name: Tests

on:
  pull_request:
    branches:
      - main

jobs:
  client:
    name: Client tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          version: 22
          cache: pnpm
